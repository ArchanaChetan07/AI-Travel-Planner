# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: travel-planner
  labels:
    app.kubernetes.io/name: travel-planner

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-planner
  namespace: travel-planner
  labels:
    app: travel-planner
    version: "1.0.0"
    app.kubernetes.io/name: travel-planner
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travel-planner
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: travel-planner
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8501"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: streamlit-app
          image: ai-travel-planner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            - name: DEMO_MODE
              value: "1"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
          # Optional live LLM secrets — omit GROQ_API_KEY to stay in DEMO_MODE
          envFrom:
            - secretRef:
                name: travel-planner-secrets
                optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: travel-planner-service
  namespace: travel-planner
  labels:
    app: travel-planner
spec:
  type: LoadBalancer
  selector:
    app: travel-planner
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8501

---
# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: travel-planner-hpa
  namespace: travel-planner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: travel-planner
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
